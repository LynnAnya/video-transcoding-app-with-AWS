<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>My Account</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand logo-main" href="/index.html">⬇️ YCD</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <!-- Dropdown Menu -->
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false">

                                <span id="username-display">Username</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                <li><a class="dropdown-item" href="#">My Account</a></li>
                                <li><a class="dropdown-item" href="/myVideos.html">My Videos</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#" onclick="logout()">Log Out</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <section class="container">
        <div class="account-content">
            <h2 class="h2-main">My Account</h2>
            <div class="account-info">
                <p id="username-info"><b>Username:</b> Guest</p>
                <p id="email-info"><b>Email: </b>guest@example.com</p>
                <p><b>Background Colour:</b></p>

                <!-- Radio Buttons-->
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="bgColor" value="#4070f4" id="color1" checked>
                    <label class="form-check-label" for="color1">Blue (Default)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="bgColor" value="#ff69b4" id="color2">
                    <label class="form-check-label" for="color2">Pink</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="bgColor" value="#0C0404" id="color3">
                    <label class="form-check-label" for="color3">Black</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="bgColor" value="#F8F8FF" id="color4">
                    <label class="form-check-label" for="color4">White</label>
                </div>
                <button class="btn btn-primary mt-3" id="saveColorBtn">Change Background Color</button>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
        <script src="background.js"></script>
    <script>

        document.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const username = localStorage.getItem('username');
            const email = localStorage.getItem('email');

            if (isLoggedIn === 'true' && username) {
                document.getElementById('username-display').textContent = username;
                document.getElementById('username-info').textContent = `Username: ${username}`;
                document.getElementById('email-info').textContent = `Email: ${email}`;
            } else {
                window.location.href = './login.html';
            }
        });
        function logout() {
            localStorage.removeItem('username');
            localStorage.removeItem('email');
            localStorage.removeItem('isLoggedIn');
            const container = document.querySelector('.container');
            container.style.backgroundColor = '#4070f4';
            fetch('/logout', { method: 'POST' })
                .then(response => {
                    if (response.ok) {
                        document.body.style.backgroundColor = '#4070f4';
                        window.location.href = "login.html";
                    } else {
                        console.error('Failed to log out');
                    }
                })
                .catch(error => {
                    console.error('Error during logout:', error);
                    alert('An error occurred. Please try again.');
                });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Admin</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand logo-main" href="/index.html">⬇️ YCD</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <!-- Dropdown Menu -->
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false">

                                <span id="username-display">Username</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                <li><a class="dropdown-item" href="/admin.html">User Management</a></li>
                                <li><a class="dropdown-item" href="/myAccount.html">My Account</a></li>
                                <li><a class="dropdown-item" href="/myVideos.html">My Videos</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#" onclick="logout()">Log Out</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <section class="container-admin">
        <div class="user-management">
            <h3 class="h3-subhead">User Management</h3>
            <table class="table table-bordered user-management-table ">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Email Verified</th>
                        <th>Actions</th>

                    </tr>
                </thead>
                <tbody id="user-table-body">
                </tbody>
            </table>
        </div>

        <div class="user-video-management" id="user-video-management">
            <h3 class="h3-subhead">User Videos</h3>
            <table class="table table-bordered user-video-table">
                <thead>
                    <tr>
                        <th>Thumbnail</th>
                        <th>Username</th>
                        <th>Video ID</th>
                        <th>Youtube Link</th>
                        <th>Duration</th>
                        <th>type</th>
                        <th>quality</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-video-table-body">
                    <!-- Videos will be populated here -->
                </tbody>
            </table>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
    <script>
        //list of all can delete user and videos, ----- > fetch all users from DynamoDB 
        document.addEventListener('DOMContentLoaded', () => {
            fetchUsers();
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const username = localStorage.getItem('username');

            if (isLoggedIn === 'true' && username) {
                document.getElementById('username-display').textContent = username;
            } else {
                window.location.href = './login.html';
            }
        });

        async function fetchUsers() {
            try {
                const response = await fetch('/users');
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                const users = await response.json();
                const tableBody = document.getElementById('user-table-body');
                tableBody.innerHTML = '';

                users.forEach(user => {  //each row here 
                    const row = document.createElement('tr');

                    // Username
                    const usernameCell = document.createElement('td');
                    usernameCell.textContent = user['username']; // each data here
                    row.appendChild(usernameCell);

                    // Email 
                    const emailCell = document.createElement('td');
                    emailCell.textContent = user['email'];
                    row.appendChild(emailCell);

                    // Email Verified 
                    const emailVerifiedCell = document.createElement('td');
                    emailVerifiedCell.textContent = user['emailVerified'] ? 'Yes' : 'No';
                    row.appendChild(emailVerifiedCell);

                    // Actions 
                    const actionsCell = document.createElement('td');

                    // View User's Videos Button
                    const viewButton = document.createElement('button');
                    viewButton.className = 'btn btn-info';
                    viewButton.textContent = "View User's Videos";
                    viewButton.onclick = () => viewUserVideos(user['username']);
                    actionsCell.appendChild(viewButton);

                    // Delete User Button
                    const deleteButton = document.createElement('button');
                    deleteButton.className = 'btn btn-danger';
                    deleteButton.textContent = 'Delete User';
                    deleteButton.style.marginLeft = '10px';
                    deleteButton.onclick = () => deleteUser(user['username']);
                    actionsCell.appendChild(deleteButton);

                    row.appendChild(actionsCell);
                    tableBody.appendChild(row);
                });
            } catch (err) {
                console.error('Error fetching users:', err);
                const tableBody = document.getElementById('user-table-body');
                tableBody.innerHTML = `<tr><td colspan="4">Error loading user data. Please try again later.</td></tr>`;
            }
        }

        async function viewUserVideos(username) {
            try {
                const response = await fetch(`/videosData/${username}`);
                if (!response.ok) {
                    throw new Error(`Failed to fetch videos for user: ${username}`);
                }

                const videos = await response.json();
                const videoTableBody = document.getElementById('user-video-table-body');
                videoTableBody.innerHTML = '';
                const videoManagementSection = document.getElementById('user-video-management');
                const videoManagementHeader = document.querySelector('#user-video-management h3');
                const table = document.querySelector('.user-video-table');

                if (videos.length === 0) {
                    // If no videos
                    videoManagementHeader.textContent = `${username} does not have any videos.`;
                    table.style.display = 'none';
                } else {
                    // If there are videos, show table, populate the rows
                    videoManagementHeader.textContent = `User ${username}'s Videos`;
                    table.style.display = 'block';
                    videoManagementSection.style.display = 'block';
                }

                // Populate the table with the user's videos
                videos.forEach(video => {
                    const row = document.createElement('tr');
                    // Thumbnail
                    const thumbnailCell = document.createElement('td');
                    const thumbnailImg = document.createElement('img');
                    thumbnailImg.src = video.thumbnail;
                    thumbnailImg.alt = 'Video Thumbnail';
                    thumbnailImg.style.width = '100px';
                    thumbnailCell.appendChild(thumbnailImg);
                    row.appendChild(thumbnailCell);

                    // Username
                    const usernameCell = document.createElement('td');
                    usernameCell.textContent = video.username;
                    row.appendChild(usernameCell);

                    // Video ID
                    const videoIdCell = document.createElement('td');
                    videoIdCell.textContent = video.videoId || 'N/A';
                    row.appendChild(videoIdCell);

                    // YouTube Link
                    const youtubeLinkCell = document.createElement('td');
                    const youtubeLink = document.createElement('a');
                    youtubeLink.href = video.youtubeLink;
                    youtubeLink.textContent = 'Watch Video';
                    youtubeLink.target = '_blank';
                    youtubeLinkCell.appendChild(youtubeLink);
                    row.appendChild(youtubeLinkCell);

                    // Duration
                    const durationCell = document.createElement('td');
                    durationCell.textContent = video.duration || 'N/A';
                    row.appendChild(durationCell);

                    // Type
                    const typeCell = document.createElement('td');
                    typeCell.textContent = video.type || 'N/A';
                    row.appendChild(typeCell);

                    // Quality
                    const qualityCell = document.createElement('td');
                    qualityCell.textContent = video.quality || 'N/A';
                    row.appendChild(qualityCell);

                    // Actions 
                    const actionsCell = document.createElement('td');
                    const deleteButton = document.createElement('button');
                    deleteButton.className = 'btn btn-danger';
                    deleteButton.textContent = 'Delete Video';
                    deleteButton.onclick = () => deleteVideo(video.videoId, video.username);
                    actionsCell.appendChild(deleteButton);
                    row.appendChild(actionsCell);

                    videoTableBody.appendChild(row);
                });
            } catch (err) {
                console.error('Error viewing videos for user:', username, err);
                const videoTableBody = document.getElementById('user-video-table-body');
                videoTableBody.innerHTML = `<tr><td colspan="7">Error loading video data. Please try again later.</td></tr>`;
            }
        }


        async function deleteUser(username) {
            if (confirm(`Are you sure you want to delete this user: ${username}?`)) {
                try {
                    const response = await fetch(`/users/${username}`, {
                        method: 'DELETE',
                    });
                    if (!response.ok) {
                        throw new Error(`HTTP error, status: ${response.status}`);
                    }
                    fetchUsers();

                } catch (err) {
                    console.error('Error deleting user:', err);
                    alert(`Failed to delete user ${username}. Please try again.`);
                }
            }
        }

        async function deleteVideo(videoId, username) {
            try {
                const response = await fetch(`/videos/${videoId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });
                if (!response.ok) {
                    throw new Error(`Failed to delete video with ID ${videoId}. Status: ${response.status}`);
                }
                const res = await response.json();
                //alert(res.message);
                viewUserVideos(username); // Refresh the user's videos table after deletion
            } catch (error) {
                console.error('Error deleting video:', error);
                alert('Error deleting video. Please try again later.');
            }
        }

        function logout() {
            localStorage.removeItem('username');
            localStorage.removeItem('email');
            localStorage.removeItem('isLoggedIn');

            fetch('/logout', { method: 'POST' })
                .then(response => {
                    if (response.ok) {
                        window.location.href = "login.html";
                    } else {
                        console.error('Failed to log out');
                    }
                })
                .catch(error => {
                    console.error('Error during logout:', error);
                    alert('An error occurred. Please try again.');
                });
        }

    </script>
</body>

</html>

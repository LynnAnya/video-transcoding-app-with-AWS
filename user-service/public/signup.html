<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"

    <title>Sign Up</title>

<body>
    <header>
        <nav class="navbar">
            <span class="logo-main">YT Clip Downloader</span>
        </nav>
    </header>
    <section class="container forms" id="signupSection">
        <div class="form signup">
            <div class="form-content">
                <header>Sign up</header>
                <form action="#" id="signupForm">
                    <span class="error-msg" id="signupError"></span>
                    <div class="field input-field">
                        <input type="text" placeholder="Username" class="input" name="username" required>
                    </div>
                    <div class="field input-field">
                        <input type="email" placeholder="Email" class="input" name="email" required>
                    </div>
                    <div class="field input-field">
                        <input type="password" placeholder="Create password" class="password" name="password" required>
                    </div>
                    <div class="field input-field">
                        <input type="password" placeholder="Confirm password" class="password" name="confirmPassword"
                            required>
                        <i class='bx bx-hide eye-icon'></i>
                        <span class="error-msg" id="signupPwdError"></span>
                    </div>
                    <div class="field button-field">
                        <button type="submit">Sign up</button>
                    </div>
                </form>
                <div class="form-link">
                    <span>Already have an account? <a href="./login.html" class="link login-link">Login</a></span>
                </div>
            </div>
        </div>
    </section>

    <script>
        ////// POST to cognito -- email confirmation code
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.querySelector('input[name="username"]').value;
            const email = document.querySelector('input[name="email"]').value;
            const password = document.querySelector('input[name="password"]').value;
            const confirmPassword = document.querySelector('input[name="confirmPassword"]').value;
            const errorMsg = document.querySelector("#signupPwdError");
            const signupError = document.getElementById('signupError');

            if (password !== confirmPassword) {
                errorMsg.textContent = "Passwords do not match";
                errorMsg.style.color = "red";
                return false;
            } else {
                errorMsg.textContent = "";
            }

            const res = await fetch('/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await res.json();
            console.log(data);

            if (data.success) {
                window.location.href = './login.html'; 
                //document.getElementById('signupSection').style.display = 'none';
                //document.getElementById('confirmSection').style.display = 'flex';
                
            } else {
                signupError.textContent = 'Signup failed: ' + data.message; // Display the error message
                signupError.style.color = 'red';
            }
        });

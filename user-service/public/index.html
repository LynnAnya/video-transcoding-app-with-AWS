<body>

    <section class="container">
        <div class="vdo-content">
            <div class="search-container">
                <h2 class="h2-main">YCD Video Converter </h2>
                <form id="upload-form" enctype="multipart/form-data">
                    <!-- <input type="file" id="file-upload" name="file" accept="video/*" />  -->
                    <div class="mb-3">
                        <label for="file-upload" class="form-label">Upload your video</label>
                        <input class="form-control" type="file" id="file-upload" name="file" accept="video/*">
                    </div>
                    <button type="button" class="btn btn-primary" onclick="uploadVideo()">Upload Video</button>
                </form>
            </div>
            <div id="progress-vdo"></div>
            <div class="vdo-content">
                <div class="vdo-detail">
                    <div class="vdo-desc">
                        <p id="title"></p>
                        <p id="duration"></p>
                    </div>
                </div>
                <div class="convert-col">
                    <table id="video-table">
                        <thead>
                            <tr>
                                <th>Video Quality & Format</th>
                                <th>Download</th>
                            </tr>
                        </thead>
                        <tbody id="video-options"></tbody>
                    </table>
                </div>
            </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
    <script src="background.js"></script>
    <script>
        //window load to check if user not log out yet will be in this page -- if log out go to log in page 
        /**
        window.onload = function() {
           const cognitoToken = localStorage.getItem("cognitoToken");
           const isLoggedIn = localStorage.getItem("isLoggedIn");
           
           if (!cognitoToken || isLoggedIn === "false"){
                window.location.href = "./login.html"
           } 
           
             // else ? verify token -- just in case
           
        } **/
        document.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const username = localStorage.getItem('username');
            if (isLoggedIn === 'true' && username) {
                document.getElementById('username-display').textContent = username;
            } else {
                window.location.href = './login.html';
            }
        });
        let isUploading = false;
        let videoTitle = "";
        let currentVideoId = "";
        async function uploadVideo() {
            if (isUploading) return;
            isUploading = true;
            document.getElementById('progress-vdo').textContent = 'Uploading video... Please wait.';
            const fileInput = document.getElementById('file-upload');
            if (fileInput.files.length === 0) {
                alert("Please select a video file to upload.");
                isUploading = false;
                return;
            }
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            try {
                const response = await fetch('/upload-video', {
                    method: 'POST',
                    body: formData,
                });
                const data = await response.json();
                if (response.ok) {
                    // Show available download options after successful upload
                    videoTitle = data.title;
                    currentVideoId = data.videoId;
                    showDownloadOptions(data.videoId);
                } else {
                    console.error('Failed to upload video:', data);
                }
            } catch (error) {
                console.error('Error uploading video:', error);
            } finally {
                isUploading = false;
                document.getElementById('progress-vdo').textContent = '';
            }
        }
        // show table for user to download vdo
        function showDownloadOptions(videoId) {
            const videoOptions = document.getElementById('video-options');
            videoOptions.innerHTML = '';
            const formats = ['360.mp4', '480.mp4', '480.webm', '720.mp4', '720.webm', '1080.mp4'];

            formats.forEach(format => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${format}</td>
                    <td><button class="download-btn" onclick="downloadVideo('${videoId}', '${format}', '${videoTitle}')">Download</button></td>
                `;
                videoOptions.appendChild(row);
            });
            const table = document.getElementById('video-table');
            table.style.display = 'table';
        }
        async function downloadVideo(videoId, format, title) {
            document.getElementById('progress-vdo').textContent = 'Processing video... Please wait.';
            try {
                const response = await fetch('/process-video', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ videoId, format, title }),
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    checkVideoStatus(videoId, format); // polling video status
                    /**
                    const a = document.createElement('a');  // how about this 
                    a.href = data.downloadLink;
                    a.download = `${videoId}.${format.split('.')[1]}`;   // different version

                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    document.getElementById('progress-vdo').textContent = '';
                    **/
                } else {
                    console.log("this is here error --> " + data.error);
                    document.getElementById('progress-vdo').textContent = 'Error starting video processing.';
                }
            } catch (error) {
                document.getElementById('progress-vdo').textContent = 'Error starting video processing.';
                console.error('Error initiating video processing:', error);
            }
        }

        //poll video status ---- to get download link properly
        function checkVideoStatus(videoId, format) {
            const pollingInterval = 5000; // Poll every 5 seconds
            const maxAttempts = 180; // Maximum number of polling attempts (e.g., 15 minutes)
            let attempts = 0;

            const interval = setInterval(async () => {
                attempts++;
                try {
                    const response = await fetch(`/check-video-status?videoId=${videoId}`);  //data status, downloadlink
                    const data = await response.json();
                    if (response.ok) {
                        if (data.status === 'completed') {
                            clearInterval(interval);
                            // Initiate download
                            const a = document.createElement('a');
                            a.href = data.downloadLink;
                            a.download = `${videoTitle}_${format}`;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            document.getElementById('progress-vdo').textContent = 'Download ready!';
                        } else if (data.status === 'processing') {
                            // Still processing
                            console.log('Video is still processing...');
                            document.getElementById('progress-vdo').textContent = 'Video is still processing...';
                        } else if (data.status === 'failed') {
                            clearInterval(interval);
                            document.getElementById('progress-vdo').textContent = 'Video processing failed.';
                            console.error('Video processing failed:', data.errorMessage);
                        } else {
                            // Handle other statuses if necessary
                            console.log(`Video status: ${data.status}`);
                        }
                    } else {
                        console.error('Error checking video status:', data.message);
                    }
                } catch (error) {
                    console.error('Error checking video status:', error);
                }

                if (attempts >= maxAttempts) {
                    clearInterval(interval);
                    document.getElementById('progress-vdo').textContent = 'Processing is taking longer than expected.';
                }
            }, pollingInterval);
        }

        function logout() {
            localStorage.removeItem('username');
            localStorage.removeItem('email');
            localStorage.removeItem('isLoggedIn');
            fetch('/logout', { method: 'POST' })
                .then(response => {
                    if (response.ok) {
                        window.location.href = "login.html";
                    } else {
                        console.error('Failed to log out');
                    }
                })
                .catch(error => {
                    console.error('Error during logout:', error);
                    alert('An error occurred. Please try again.');
                });
        }
    </script>
